<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛英語 52 句隨身聽 - 語音穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', 'Noto+Sans+TC', sans-serif;
            background: #fff9f0;
            min-height: 100vh;
        }
        .phrase-card {
            background: white;
            border: 3px solid #f0f0f0;
            transition: all 0.3s ease;
        }
        .phrase-card:hover {
            transform: translateY(-5px);
            border-color: #ffcf81;
        }
        .recording {
            background-color: #ef4444 !important;
            color: white !important;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .is-playing {
            border-color: #fbbf24 !important;
            background-color: #fffbeb !important;
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-4">
                英語常用 52 句隨身聽
            </h1>
            <p class="text-gray-500">點擊播放聽發音，點擊麥克風挑戰跟讀！</p>
        </header>

        <div class="mb-12 max-w-md mx-auto">
            <input type="text" id="searchInput" placeholder="搜尋句子..." 
                class="w-full px-6 py-4 rounded-full border-2 border-gray-200 focus:border-yellow-400 focus:outline-none shadow-sm" 
                onkeyup="filterPhrases()">
        </div>

        <div id="phraseGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 由 JS 生成 -->
        </div>
    </div>

    <div id="loadingOverlay" class="fixed bottom-6 right-6 bg-white border-2 border-yellow-400 p-4 rounded-2xl shadow-xl flex items-center gap-3 hidden">
        <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-yellow-400"></div>
        <span id="loadingText" class="text-gray-700 font-bold">處理中...</span>
    </div>

    <script>
        const apiKey = ""; // 環境自動注入 API Key
        
        const phrases = [
            { en: "How's it going?", zh: "最近怎麼樣？", icon: "👋" },
            { en: "Long time no see!", zh: "好久不見！", icon: "✨" },
            { en: "Can you help me?", zh: "你能幫我嗎？", icon: "🤝" },
            { en: "I really appreciate it.", zh: "我真的很感激。", icon: "💖" },
            { en: "What do you think?", zh: "你覺得呢？", icon: "💡" },
            { en: "Never mind.", zh: "沒關係 / 別介意。", icon: "🍃" },
            { en: "That sounds great!", zh: "聽起來很棒！", icon: "🎉" },
            { en: "I'm on my way.", zh: "我在路上了。", icon: "🏃" },
            { en: "Take it easy.", zh: "放輕鬆。", icon: "🧘" },
            { en: "It's up to you.", zh: "由你決定。", icon: "🎯" },
            { en: "I'm not sure.", zh: "我不確定。", icon: "🤔" },
            { en: "See you later!", zh: "待會見！", icon: "👋" },
            { en: "Have a nice day!", zh: "祝你有美好的一天！", icon: "☀️" },
            { en: "You're welcome.", zh: "不客氣。", icon: "😊" },
            { en: "Excuse me.", zh: "不好意思。", icon: "✋" },
            { en: "I'm sorry to hear that.", zh: "很遺憾聽到這件事。", icon: "😢" },
            { en: "What's up?", zh: "怎麼了？ / 嘿！", icon: "🤙" },
            { en: "No problem.", zh: "沒問題。", icon: "👌" },
            { en: "Wait a minute.", zh: "等一下。", icon: "⏳" },
            { en: "I don't understand.", zh: "我不明白。", icon: "❓" },
            { en: "Could you repeat that?", zh: "你能重複一遍嗎？", icon: "👂" },
            { en: "It doesn't matter.", zh: "沒關係 / 不重要。", icon: "🌈" },
            { en: "I'm so proud of you.", zh: "我為你感到驕傲。", icon: "🏆" },
            { en: "Good luck!", zh: "祝好運！", icon: "🍀" },
            { en: "Keep it up!", zh: "繼續加油！" , icon: "💪"},
            { en: "I'll be right back.", zh: "我馬上回來。", icon: "🔙" },
            { en: "What a relief!", zh: "真是鬆了一口氣！", icon: "😌" },
            { en: "That's a good point.", zh: "那是個很好的觀點。", icon: "☝️" },
            { en: "I'm starving.", zh: "我快餓死了。", icon: "🍕" },
            { en: "Believe in yourself.", zh: "相信你自己。", icon: "🌟" },
            { en: "You can make it.", zh: "你能做到的。", icon: "🌈" },
            { en: "Let me know.", zh: "讓我知道。", icon: "📩" },
            { en: "I'm exhausted.", zh: "我累壞了。", icon: "😴" },
            { en: "Cheer up!", zh: "振作起來！", icon: "🎈" },
            { en: "By the way...", zh: "順便一提...", icon: "📎" },
            { en: "Don't worry about it.", zh: "別擔心。", icon: "🛡️" },
            { en: "I agree with you.", zh: "我同意你。", icon: "✅" },
            { en: "That's incredible!", zh: "太不可思議了！", icon: "😲" },
            { en: "How have you been?", zh: "你最近好嗎？", icon: "🌻" },
            { en: "I'm bored.", zh: "我覺得很無聊。", icon: "🥱" },
            { en: "Are you kidding?", zh: "你在開玩笑嗎？", icon: "😜" },
            { en: "It's worth a try.", zh: "值得一試。", icon: "🧪" },
            { en: "No way!", zh: "不可能！/ 沒門！", icon: "🚫" },
            { en: "I lost my way.", zh: "我迷路了。", icon: "📍" },
            { en: "Can I take a message?", zh: "需要我留言嗎？", icon: "📝" },
            { en: "I'll check it out.", zh: "我會去確認看看。", icon: "🕵️" },
            { en: "Don't give up.", zh: "不要放棄。", icon: "🧗" },
            { en: "Time flies.", zh: "時光荏苒。", icon: "🕊️" },
            { en: "Better late than never.", zh: "遲到總比不到好。", icon: "🐢" },
            { en: "Keep in touch.", zh: "保持聯繫。", icon: "📞" },
            { en: "What's the weather like?", zh: "天氣怎麼樣？", icon: "☁️" },
            { en: "Enjoy your meal!", zh: "祝用餐愉快！", icon: "😋" }
        ];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
        }

        function renderPhrases() {
            const grid = document.getElementById('phraseGrid');
            grid.innerHTML = phrases.map((p, index) => `
                <div class="phrase-card p-6 rounded-3xl flex flex-col items-center text-center shadow-sm" id="card-${index}">
                    <div class="text-4xl mb-4">${p.icon}</div>
                    <div class="mb-4">
                        <h2 class="text-xl font-bold text-gray-800">${p.en}</h2>
                        <p class="text-gray-500 text-sm">${p.zh}</p>
                    </div>
                    <div id="score-area-${index}" class="hidden mb-4 text-orange-500 font-bold text-xl">
                        分數: <span id="score-val-${index}">0</span>
                    </div>
                    <div class="flex gap-4 mt-auto">
                        <button onclick="playAudio('${p.en.replace(/'/g, "\\'")}', 'female', this)" class="p-3 bg-gray-100 rounded-full hover:bg-yellow-100 transition-colors" title="女聲">👩</button>
                        <button onclick="playAudio('${p.en.replace(/'/g, "\\'")}', 'male', this)" class="p-3 bg-gray-100 rounded-full hover:bg-yellow-100 transition-colors" title="男聲">👨</button>
                        <button onclick="startRecording(${index})" id="rec-btn-${index}" class="p-3 bg-red-50 text-red-500 rounded-full hover:bg-red-100 transition-colors" title="錄音挑戰">🎤</button>
                    </div>
                </div>
            `).join('');
        }

        async function playAudio(text, gender, btn) {
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            overlay.classList.remove('hidden');
            loadingText.innerText = "語音生成中...";
            btn.classList.add('is-playing');

            const voiceName = gender === 'female' ? "Kore" : "Puck";

            const fetchWithRetry = async (retries = 3, backoff = 1000) => {
                // 使用專用的 TTS 模型
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: { voiceName: voiceName }
                                }
                            }
                        }
                    })
                });

                if (!response.ok) {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, backoff));
                        return fetchWithRetry(retries - 1, backoff * 1.5);
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            };

            try {
                const result = await fetchWithRetry();
                
                // 檢查是否含有音訊部分
                const part = result.candidates?.[0]?.content?.parts?.[0];
                if (!part || !part.inlineData) {
                    console.error("No inlineData in parts:", result);
                    throw new Error("模型未傳回音訊數據");
                }

                const base64Data = part.inlineData.data;
                const mimeType = part.inlineData.mimeType || "audio/L16;rate=24000";
                const sampleRate = parseInt(mimeType.split('rate=')[1]) || 24000;
                
                const wavBlob = pcmToWav(base64Data, sampleRate);
                const audioUrl = URL.createObjectURL(wavBlob);
                const audio = new Audio(audioUrl);
                
                audio.play().catch(e => {
                    console.warn("Autoplay blocked:", e);
                    loadingText.innerText = "請點擊按鈕重試";
                });

                audio.onended = () => {
                    btn.classList.remove('is-playing');
                    URL.revokeObjectURL(audioUrl);
                    overlay.classList.add('hidden');
                };

                // 設定逾時保護
                setTimeout(() => {
                    if (btn.classList.contains('is-playing')) {
                        btn.classList.remove('is-playing');
                        overlay.classList.add('hidden');
                    }
                }, 8000);

            } catch (error) {
                console.error("播放流程錯誤:", error);
                btn.classList.remove('is-playing');
                loadingText.innerText = "服務暫時忙碌，請稍候再試";
                setTimeout(() => overlay.classList.add('hidden'), 2000);
            }
        }

        function pcmToWav(base64, sampleRate) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);

            const buffer = new ArrayBuffer(44 + len);
            const view = new DataView(buffer);

            const writeString = (offset, s) => {
                for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + len, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // 單聲道
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); // Block Align
            view.setUint16(34, 16, true); // Bits per sample
            writeString(36, 'data');
            view.setUint32(40, len, true);
            for (let i = 0; i < len; i++) view.setUint8(44 + i, bytes[i]);

            return new Blob([buffer], { type: 'audio/wav' });
        }

        function startRecording(index) {
            if (!recognition) return alert("瀏覽器不支援語音辨識");
            const btn = document.getElementById(`rec-btn-${index}`);
            btn.classList.add('recording');
            
            try {
                recognition.start();
            } catch (e) {
                recognition.stop();
            }

            recognition.onresult = (event) => {
                const userText = event.results[0][0].transcript.toLowerCase();
                const originalText = phrases[index].en.toLowerCase().replace(/[^\w\s]/g, "");
                const score = calculateScore(originalText, userText);
                showScore(index, score);
                if (score === 100) {
                    confetti({ 
                        particleCount: 150, 
                        spread: 70, 
                        origin: { y: 0.6 },
                        colors: ['#fbbf24', '#f59e0b', '#ffffff']
                    });
                }
            };

            recognition.onend = () => btn.classList.remove('recording');
            recognition.onerror = () => btn.classList.remove('recording');
        }

        function calculateScore(s1, s2) {
            if (s1 === s2) return 100;
            const w1 = s1.split(/\s+/), w2 = s2.split(/\s+/);
            let matches = 0;
            w1.forEach(w => { if (w2.includes(w)) matches++; });
            return Math.round((matches / w1.length) * 100);
        }

        function showScore(index, score) {
            const area = document.getElementById(`score-area-${index}`);
            area.classList.remove('hidden');
            document.getElementById(`score-val-${index}`).innerText = score;
        }

        function filterPhrases() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            phrases.forEach((p, i) => {
                const card = document.getElementById(`card-${i}`);
                const isMatch = p.en.toLowerCase().includes(query) || p.zh.toLowerCase().includes(query);
                card.style.display = isMatch ? 'flex' : 'none';
            });
        }

        window.onload = renderPhrases;
    </script>
</body>
</html>
